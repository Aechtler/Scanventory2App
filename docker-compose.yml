services:
  # Backend API
  # Hinweis: PostgreSQL läuft jetzt in Supabase (self-hosted oder Cloud).
  # Der db-Service wurde entfernt. DATABASE_URL zeigt auf Supabase.
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scanapp-backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - scanapp-network

# uploads-Volume entfernt: Bilder liegen in Supabase Storage

networks:
  scanapp-network:
    name: scanapp-network
    driver: bridge
