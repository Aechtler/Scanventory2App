services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: scanapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanapp
      POSTGRES_PASSWORD: scanapp_dev
      POSTGRES_DB: scanapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scanapp-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scanapp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scanapp:scanapp_dev@db:5432/scanapp
      PORT: 3000
      API_KEY: ${API_KEY:-change-me-to-a-secure-key}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      # For development: mount source code for hot reload
      # - ./packages/backend/src:/app/src
    ports:
      - "3000:3000"
    networks:
      - scanapp-network

volumes:
  pgdata:
    name: scanapp-pgdata
  uploads:
    name: scanapp-uploads

networks:
  scanapp-network:
    name: scanapp-network
    driver: bridge
