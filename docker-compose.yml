services:
  # Backend API
  # Hinweis: PostgreSQL und Auth laufen in Supabase (self-hosted, supabase/self-hosted/).
  # Der Backend-Container muss im selben Docker-Netzwerk wie Supabase laufen,
  # damit er 'kong' (API Gateway) und 'db' (Postgres) per Service-Name erreichen kann.
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scanapp-backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - scanapp-network
      - scanapp-supabase-network

networks:
  scanapp-network:
    name: scanapp-network
    driver: bridge
  # Externes Netzwerk — wird vom Supabase-Stack erstellt (supabase/self-hosted/)
  # Starte zuerst: cd supabase/self-hosted && docker compose up -d
  scanapp-supabase-network:
    name: scanapp-supabase-network
    external: true
