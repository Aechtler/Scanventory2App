services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: scanapp-db
    restart: unless-stopped
    env_file:
      - ./.env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scanapp-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scanapp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env.docker
    environment:
      PORT: 3000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    networks:
      - scanapp-network
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.scanapp-backend.rule=Host(`os8gw44wgg888804koo08gso.72.62.49.60.sslip.io`)
      - traefik.http.routers.scanapp-backend.entrypoints=http
      - traefik.http.services.scanapp-backend.loadbalancer.server.port=3000
      - traefik.docker.network=coolify

volumes:
  pgdata:
    name: scanapp-pgdata
  uploads:
    name: scanapp-uploads

networks:
  scanapp-network:
    name: scanapp-network
    driver: bridge
  coolify:
    external: true
