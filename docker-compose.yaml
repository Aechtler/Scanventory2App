services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: scanapp-db
    restart: unless-stopped
    env_file:
      - ./.env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scanapp-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scanapp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env.docker
    environment:
      PORT: 3000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      # For development: mount source code for hot reload
      # - ./packages/backend/src:/app/src
    networks:
      - scanapp-network

volumes:
  pgdata:
    name: scanapp-pgdata
  uploads:
    name: scanapp-uploads

networks:
  scanapp-network:
    name: scanapp-network
    driver: bridge
